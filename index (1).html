<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ฟ้าเมืองไทย — สภาพอากาศและ PM2.5 รายจังหวัด</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#101923;
    --navy-2:#182430;
    --paper:#F6F4EE;
    --card:#FFFFFF;
    --ink:#12181F;
    --ink-soft:#5B6672;
    --line:#E4E0D6;
    --cyan:#2FB6B2;
    --sun:#F2A93B;
    --blue-aqi:#3B82C4;
    --green-aqi:#4CA95A;
    --yellow-aqi:#D8A32B;
    --orange-aqi:#DB7A2E;
    --red-aqi:#C4483F;
    --radius:14px;
    --font-display:'Space Grotesk',sans-serif;
    --font-body:'Inter',sans-serif;
    --font-mono:'IBM Plex Mono',monospace;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    font-family:var(--font-body);
    background:var(--paper);
    color:var(--ink);
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
  }
  a{color:inherit; text-decoration:none;}
  button{font-family:inherit; cursor:pointer;}
  ::selection{background:var(--cyan); color:#fff;}

  /* ---------- sky strip signature ---------- */
  #skystrip{
    height:6px;
    width:100%;
    transition:background 1.2s ease;
  }

  header.top{
    background:var(--navy);
    color:#EDEAE0;
    padding:22px 24px 26px;
  }
  .top-inner{
    max-width:1080px; margin:0 auto;
    display:flex; align-items:center; justify-content:space-between; gap:20px; flex-wrap:wrap;
  }
  .brand{display:flex; align-items:center; gap:10px; cursor:pointer;}
  .brand-mark{
    width:34px; height:34px; border-radius:50%;
    background:linear-gradient(180deg, var(--sun), var(--cyan));
    flex-shrink:0;
  }
  .brand h1{font-family:var(--font-display); font-size:20px; font-weight:600; letter-spacing:.2px;}
  .brand span{display:block; font-size:11px; color:#9AA7B2; font-weight:400; margin-top:1px;}

  .search-wrap{position:relative; flex:1; min-width:220px; max-width:340px;}
  .search-wrap input{
    width:100%; padding:10px 14px 10px 36px;
    background:var(--navy-2); border:1px solid #2A3641; border-radius:999px;
    color:#EDEAE0; font-size:14px; font-family:var(--font-body);
  }
  .search-wrap input::placeholder{color:#7C8792;}
  .search-wrap input:focus{outline:none; border-color:var(--cyan);}
  .search-wrap svg{position:absolute; left:12px; top:50%; transform:translateY(-50%); opacity:.6;}

  main{max-width:1080px; margin:0 auto; padding:32px 24px 80px;}
  .view{display:none;}
  .view.active{display:block; animation:fade .35s ease;}
  @keyframes fade{from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);}}

  .section-title{
    font-family:var(--font-display); font-size:15px; font-weight:600;
    color:var(--ink-soft); text-transform:uppercase; letter-spacing:.08em;
    margin:36px 0 14px;
  }
  .section-title:first-child{margin-top:0;}

  /* ---------- PM2.5 overview strip on home ---------- */
  .pm-scroll{
    display:flex; gap:12px; overflow-x:auto; padding-bottom:6px;
    scrollbar-width:thin;
  }
  .pm-chip{
    flex:0 0 auto; width:158px; background:var(--card); border:1px solid var(--line);
    border-radius:var(--radius); padding:14px; cursor:pointer;
    transition:transform .15s ease, box-shadow .15s ease;
  }
  .pm-chip:hover{transform:translateY(-2px); box-shadow:0 6px 18px rgba(16,25,35,.08);}
  .pm-chip .dot{width:10px; height:10px; border-radius:50%; margin-bottom:10px;}
  .pm-chip .val{font-family:var(--font-mono); font-size:26px; font-weight:600;}
  .pm-chip .prov{font-size:13px; color:var(--ink-soft); margin-top:2px;}
  .pm-chip .lvl{font-size:11px; font-weight:600; margin-top:6px;}

  /* ---------- province grid ---------- */
  .grid{
    display:grid; grid-template-columns:repeat(auto-fill, minmax(168px,1fr)); gap:12px;
  }
  .prov-card{
    background:var(--card); border:1px solid var(--line); border-radius:var(--radius);
    padding:16px; cursor:pointer; transition:transform .15s ease, box-shadow .15s ease;
  }
  .prov-card:hover{transform:translateY(-2px); box-shadow:0 6px 18px rgba(16,25,35,.08);}
  .prov-card .name{font-family:var(--font-display); font-weight:600; font-size:14.5px; margin-bottom:10px; min-height:36px;}
  .prov-card .row{display:flex; align-items:center; justify-content:space-between;}
  .prov-card .temp{font-family:var(--font-mono); font-size:22px; font-weight:600;}
  .prov-card .cond{font-size:11px; color:var(--ink-soft); margin-top:8px;}

  .empty{color:var(--ink-soft); font-size:14px; padding:20px 0;}

  /* ---------- back button ---------- */
  .back-btn{
    display:inline-flex; align-items:center; gap:6px; font-size:13px; font-weight:600;
    color:var(--ink-soft); background:none; border:none; margin-bottom:18px;
  }
  .back-btn:hover{color:var(--ink);}

  /* ---------- province weather view ---------- */
  .weather-hero{
    background:var(--navy); color:#EDEAE0; border-radius:20px; padding:30px 28px;
    display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:20px;
  }
  .weather-hero h2{font-family:var(--font-display); font-size:26px; font-weight:600;}
  .weather-hero .cond-label{font-size:14px; color:#9AA7B2; margin-top:4px;}
  .weather-hero .temp-big{font-family:var(--font-mono); font-size:64px; font-weight:600; line-height:1;}
  .weather-hero .icon-wrap{opacity:.9;}

  .stat-row{display:grid; grid-template-columns:repeat(auto-fit,minmax(120px,1fr)); gap:12px; margin-top:20px;}
  .stat-box{
    background:var(--card); border:1px solid var(--line); border-radius:var(--radius); padding:14px 16px;
  }
  .stat-box .label{font-size:11px; color:var(--ink-soft); text-transform:uppercase; letter-spacing:.06em;}
  .stat-box .value{font-family:var(--font-mono); font-size:20px; font-weight:600; margin-top:4px;}

  .forecast-row{display:flex; gap:10px; overflow-x:auto; margin-top:10px;}
  .fc-day{
    flex:0 0 auto; width:88px; background:var(--card); border:1px solid var(--line);
    border-radius:var(--radius); padding:12px 10px; text-align:center;
  }
  .fc-day .d{font-size:12px; color:var(--ink-soft); font-weight:600;}
  .fc-day .t{font-family:var(--font-mono); font-size:16px; margin-top:8px;}

  .pm-link-card{
    margin-top:24px; display:flex; align-items:center; justify-content:space-between;
    background:var(--card); border:1px solid var(--line); border-radius:var(--radius);
    padding:18px 20px; cursor:pointer; transition:box-shadow .15s ease;
  }
  .pm-link-card:hover{box-shadow:0 6px 18px rgba(16,25,35,.08);}
  .pm-link-card .l{font-size:13px; color:var(--ink-soft);}
  .pm-link-card .v{font-family:var(--font-mono); font-size:28px; font-weight:600; margin-top:2px;}
  .pm-link-card .arrow{opacity:.5;}

  /* ---------- pm2.5 detail view ---------- */
  .aqi-hero{
    border-radius:20px; padding:30px 28px; color:#fff;
    display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:20px;
  }
  .aqi-hero h2{font-family:var(--font-display); font-size:22px; font-weight:600;}
  .aqi-hero .num{font-family:var(--font-mono); font-size:60px; font-weight:600; line-height:1;}
  .aqi-hero .unit{font-size:12px; opacity:.85;}
  .aqi-hero .level{font-family:var(--font-display); font-size:16px; font-weight:600; margin-top:4px;}

  .advice-box{
    margin-top:20px; background:var(--card); border:1px solid var(--line); border-radius:var(--radius);
    padding:18px 20px; font-size:14px; color:var(--ink);
  }
  .advice-box b{font-family:var(--font-display); font-weight:600; display:block; margin-bottom:6px; font-size:13px; text-transform:uppercase; letter-spacing:.06em; color:var(--ink-soft);}

  .chart-wrap{margin-top:10px; background:var(--card); border:1px solid var(--line); border-radius:var(--radius); padding:20px;}
  .chart-bars{display:flex; align-items:flex-end; gap:4px; height:120px;}
  .chart-bars .bar{flex:1; border-radius:3px 3px 0 0; min-width:4px;}
  .chart-labels{display:flex; justify-content:space-between; font-size:10px; color:var(--ink-soft); margin-top:6px; font-family:var(--font-mono);}

  footer{
    text-align:center; padding:28px 24px 40px; font-size:12px; color:var(--ink-soft);
  }

  @media(max-width:560px){
    .weather-hero .temp-big{font-size:48px;}
    .aqi-hero .num{font-size:46px;}
  }
</style>
</head>
<body>

<div id="skystrip"></div>
<header class="top">
  <div class="top-inner">
    <div class="brand" onclick="navigate('home')">
      <div class="brand-mark"></div>
      <div>
        <h1>ฟ้าเมืองไทย</h1>
        <span>สภาพอากาศและ PM2.5 รายจังหวัด · ข้อมูลจำลอง</span>
      </div>
    </div>
    <div class="search-wrap">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#9AA7B2" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input id="searchInput" type="text" placeholder="ค้นหาจังหวัด..." oninput="renderProvinceGrid()">
    </div>
  </div>
</header>

<main>

  <!-- ============ HOME VIEW ============ -->
  <section id="view-home" class="view">
    <div class="section-title">จังหวัดที่ค่าฝุ่นสูงสุดวันนี้</div>
    <div id="pmScroll" class="pm-scroll"></div>

    <div class="section-title">จังหวัดทั้งหมด (77 จังหวัด)</div>
    <div id="provGrid" class="grid"></div>
  </section>

  <!-- ============ PROVINCE WEATHER VIEW ============ -->
  <section id="view-province" class="view">
    <button class="back-btn" onclick="navigate('home')">&larr; กลับหน้าแรก</button>
    <div class="weather-hero" id="weatherHero"></div>
    <div class="stat-row" id="statRow"></div>
    <div class="section-title">พยากรณ์ 5 วัน</div>
    <div class="forecast-row" id="forecastRow"></div>
    <div class="pm-link-card" id="pmLinkCard"></div>
  </section>

  <!-- ============ PM2.5 VIEW ============ -->
  <section id="view-pm25" class="view">
    <button class="back-btn" id="pm25BackBtn">&larr; กลับ</button>
    <div class="aqi-hero" id="aqiHero"></div>
    <div class="advice-box" id="adviceBox"></div>
    <div class="section-title">ค่าฝุ่นย้อนหลัง 24 ชั่วโมง (µg/m³)</div>
    <div class="chart-wrap">
      <div class="chart-bars" id="chartBars"></div>
      <div class="chart-labels"><span>-24 ชม.</span><span>-12 ชม.</span><span>ตอนนี้</span></div>
    </div>
  </section>

</main>

<footer>ข้อมูลในหน้านี้เป็นข้อมูลจำลองเพื่อสาธิตการออกแบบ ยังไม่เชื่อมต่อ API จริง</footer>

<script>
/* ---------------- PROVINCES ---------------- */
const PROVINCES = ["กรุงเทพมหานคร","กระบี่","กาญจนบุรี","กาฬสินธุ์","กำแพงเพชร","ขอนแก่น","จันทบุรี","ฉะเชิงเทรา","ชลบุรี","ชัยนาท","ชัยภูมิ","ชุมพร","เชียงราย","เชียงใหม่","ตรัง","ตราด","ตาก","นครนายก","นครปฐม","นครพนม","นครราชสีมา","นครศรีธรรมราช","นครสวรรค์","นนทบุรี","นราธิวาส","น่าน","บึงกาฬ","บุรีรัมย์","ปทุมธานี","ประจวบคีรีขันธ์","ปราจีนบุรี","ปัตตานี","พระนครศรีอยุธยา","พะเยา","พังงา","พัทลุง","พิจิตร","พิษณุโลก","เพชรบุรี","เพชรบูรณ์","แพร่","ภูเก็ต","มหาสารคาม","มุกดาหาร","แม่ฮ่องสอน","ยโสธร","ยะลา","ร้อยเอ็ด","ระนอง","ระยอง","ราชบุรี","ลพบุรี","ลำปาง","ลำพูน","เลย","ศรีสะเกษ","สกลนคร","สงขลา","สตูล","สมุทรปราการ","สมุทรสงคราม","สมุทรสาคร","สระแก้ว","สระบุรี","สิงห์บุรี","สุโขทัย","สุพรรณบุรี","สุราษฎร์ธานี","สุรินทร์","หนองคาย","หนองบัวลำภู","อ่างทอง","อำนาจเจริญ","อุดรธานี","อุตรดิตถ์","อุทัยธานี","อุบลราชธานี"];

const CONDITIONS = [
  {key:"sunny", label:"แดดจัด"},
  {key:"partly", label:"มีเมฆบางส่วน"},
  {key:"cloudy", label:"ครึ้มฟ้า"},
  {key:"rain", label:"ฝนตก"}
];

/* ---------------- deterministic mock data ---------------- */
function hashStr(s){ let h=0; for(let i=0;i<s.length;i++){h=(h<<5)-h+s.charCodeAt(i); h|=0;} return Math.abs(h); }
function mulberry32(seed){
  return function(){
    seed |= 0; seed = seed + 0x6D2B79F5 | 0;
    let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  }
}
const todaySeed = new Date().toISOString().slice(0,10);

function getProvinceData(name){
  const rng = mulberry32(hashStr(name + todaySeed));
  const temp = Math.round(24 + rng()*13);
  const humidity = Math.round(45 + rng()*45);
  const wind = Math.round(3 + rng()*22);
  const condition = CONDITIONS[Math.floor(rng()*CONDITIONS.length)];
  const basePm = Math.round(8 + rng()*140);
  const forecast = Array.from({length:5}, (_,i)=>{
    const r2 = mulberry32(hashStr(name+todaySeed+i));
    return { high: Math.round(temp + r2()*4), low: Math.round(temp - 4 - r2()*4) };
  });
  const history24 = Array.from({length:24}, (_,i)=>{
    const r3 = mulberry32(hashStr(name+"h"+todaySeed+i));
    return Math.max(3, Math.round(basePm + (r3()-0.5)*40));
  });
  return { temp, humidity, wind, condition, pm25: basePm, forecast, history24 };
}

/* ---------------- AQI scale (Thai PCD, 24-hr PM2.5) ---------------- */
function aqiLevel(pm){
  if(pm<=25) return {label:"ดีมาก", color:"var(--blue-aqi)", advice:"คุณภาพอากาศดีมาก เหมาะกับกิจกรรมกลางแจ้งได้ตามปกติ"};
  if(pm<=37) return {label:"ดี", color:"var(--green-aqi)", advice:"คุณภาพอากาศอยู่ในเกณฑ์ดี ทำกิจกรรมกลางแจ้งได้ตามปกติ"};
  if(pm<=50) return {label:"ปานกลาง", color:"var(--yellow-aqi)", advice:"กลุ่มเสี่ยงควรสังเกตอาการผิดปกติ หากทำกิจกรรมกลางแจ้งเป็นเวลานาน"};
  if(pm<=90) return {label:"เริ่มมีผลกระทบต่อสุขภาพ", color:"var(--orange-aqi)", advice:"ควรลดระยะเวลาทำกิจกรรมกลางแจ้ง โดยเฉพาะกลุ่มเสี่ยง เช่น เด็ก ผู้สูงอายุ และผู้มีโรคทางเดินหายใจ"};
  return {label:"มีผลกระทบต่อสุขภาพ", color:"var(--red-aqi)", advice:"ควรหลีกเลี่ยงกิจกรรมกลางแจ้ง และสวมหน้ากาก N95 หากจำเป็นต้องออกนอกอาคาร"};
}

/* ---------------- weather icons (inline svg) ---------------- */
function weatherIcon(key, size=48, stroke="#EDEAE0"){
  const s = `width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="${stroke}" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"`;
  if(key==="sunny") return `<svg ${s}><circle cx="12" cy="12" r="4.5"/><path d="M12 2v2.5M12 19.5V22M4.2 4.2l1.8 1.8M18 18l1.8 1.8M2 12h2.5M19.5 12H22M4.2 19.8l1.8-1.8M18 6l1.8-1.8"/></svg>`;
  if(key==="partly") return `<svg ${s}><circle cx="9" cy="10" r="3.4"/><path d="M9 4.5V6M4.5 10H3M13.5 6.2l-1 1M4.5 15.7l1-1"/><path d="M11 18h6a3.3 3.3 0 0 0 .5-6.6 4.3 4.3 0 0 0-8.2-1.4"/></svg>`;
  if(key==="cloudy") return `<svg ${s}><path d="M6.5 18h11a3.7 3.7 0 0 0 .5-7.4 5 5 0 0 0-9.6-1.6A4.2 4.2 0 0 0 6.5 18Z"/></svg>`;
  return `<svg ${s}><path d="M6.5 15h11a3.7 3.7 0 0 0 .5-7.4 5 5 0 0 0-9.6-1.6A4.2 4.2 0 0 0 6.5 15Z"/><path d="M8 19l-1 2M12 19l-1 2M16 19l-1 2"/></svg>`;
}

/* ---------------- sky strip signature ---------------- */
function paintSkyStrip(){
  const h = new Date().getHours();
  let grad;
  if(h>=5 && h<8) grad = "linear-gradient(90deg,#3B4A63,#F2A93B)";
  else if(h>=8 && h<17) grad = "linear-gradient(90deg,#2FB6B2,#7FD8D4)";
  else if(h>=17 && h<19) grad = "linear-gradient(90deg,#F2A93B,#C4483F)";
  else grad = "linear-gradient(90deg,#101923,#2A3B52)";
  document.getElementById('skystrip').style.background = grad;
}

/* ---------------- render: home ---------------- */
function renderPmScroll(){
  const ranked = [...PROVINCES].map(p=>({name:p, pm:getProvinceData(p).pm25}))
    .sort((a,b)=>b.pm-a.pm).slice(0,8);
  const el = document.getElementById('pmScroll');
  el.innerHTML = ranked.map(r=>{
    const lvl = aqiLevel(r.pm);
    return `<div class="pm-chip" onclick="navigate('pm25','${r.name}')">
      <div class="dot" style="background:${lvl.color}"></div>
      <div class="val">${r.pm}</div>
      <div class="prov">${r.name}</div>
      <div class="lvl" style="color:${lvl.color}">${lvl.label}</div>
    </div>`;
  }).join('');
}

function renderProvinceGrid(){
  const q = (document.getElementById('searchInput').value||"").trim();
  const list = PROVINCES.filter(p=>p.includes(q));
  const el = document.getElementById('provGrid');
  if(list.length===0){ el.innerHTML = `<div class="empty">ไม่พบจังหวัดที่ค้นหา</div>`; return; }
  el.innerHTML = list.map(p=>{
    const d = getProvinceData(p);
    return `<div class="prov-card" onclick="navigate('province','${p}')">
      <div class="name">${p}</div>
      <div class="row">
        <div class="temp">${d.temp}&deg;</div>
        ${weatherIcon(d.condition.key, 30, "#12181F")}
      </div>
      <div class="cond">${d.condition.label}</div>
    </div>`;
  }).join('');
}

/* ---------------- render: province weather ---------------- */
function renderProvinceView(name){
  const d = getProvinceData(name);
  document.getElementById('weatherHero').innerHTML = `
    <div>
      <h2>${name}</h2>
      <div class="cond-label">${d.condition.label} &middot; ปรับปรุงล่าสุดวันนี้</div>
      <div class="temp-big">${d.temp}&deg;</div>
    </div>
    <div class="icon-wrap">${weatherIcon(d.condition.key, 84)}</div>
  `;
  document.getElementById('statRow').innerHTML = `
    <div class="stat-box"><div class="label">ความชื้น</div><div class="value">${d.humidity}%</div></div>
    <div class="stat-box"><div class="label">ความเร็วลม</div><div class="value">${d.wind} กม./ชม.</div></div>
    <div class="stat-box"><div class="label">อุณหภูมิสูงสุด</div><div class="value">${d.forecast[0].high}&deg;</div></div>
    <div class="stat-box"><div class="label">อุณหภูมิต่ำสุด</div><div class="value">${d.forecast[0].low}&deg;</div></div>
  `;
  const days = ["วันนี้","พรุ่งนี้","วันที่ 3","วันที่ 4","วันที่ 5"];
  document.getElementById('forecastRow').innerHTML = d.forecast.map((f,i)=>`
    <div class="fc-day">
      <div class="d">${days[i]}</div>
      ${weatherIcon(CONDITIONS[i % CONDITIONS.length].key, 26, "#12181F")}
      <div class="t">${f.high}&deg;/${f.low}&deg;</div>
    </div>`).join('');
  const lvl = aqiLevel(d.pm25);
  document.getElementById('pmLinkCard').innerHTML = `
    <div>
      <div class="l">คุณภาพอากาศ PM2.5 &middot; ${lvl.label}</div>
      <div class="v" style="color:${lvl.color}">${d.pm25} µg/m&sup3;</div>
    </div>
    <div class="arrow">&rarr;</div>
  `;
  document.getElementById('pmLinkCard').onclick = ()=>navigate('pm25', name);
}

/* ---------------- render: pm2.5 detail ---------------- */
function renderPm25View(name, fromProvince){
  const d = getProvinceData(name);
  const lvl = aqiLevel(d.pm25);
  document.getElementById('aqiHero').style.background = lvl.color;
  document.getElementById('aqiHero').innerHTML = `
    <div>
      <h2>${name}</h2>
      <div class="num">${d.pm25}<span class="unit"> µg/m&sup3;</span></div>
    </div>
    <div class="level">${lvl.label}</div>
  `;
  document.getElementById('adviceBox').innerHTML = `<b>คำแนะนำ</b>${lvl.advice}`;
  const max = Math.max(...d.history24, 10);
  document.getElementById('chartBars').innerHTML = d.history24.map(v=>{
    const c = aqiLevel(v).color;
    const h = Math.max(4, Math.round((v/max)*100));
    return `<div class="bar" style="height:${h}px; background:${c}" title="${v} µg/m³"></div>`;
  }).join('');
  const backBtn = document.getElementById('pm25BackBtn');
  backBtn.textContent = fromProvince ? `\u2190 กลับไปหน้าอากาศ${name}` : "\u2190 กลับหน้าแรก";
  backBtn.onclick = ()=> fromProvince ? navigate('province', name) : navigate('home');
}

/* ---------------- routing ---------------- */
let currentProvince = null;
function navigate(view, province){
  if(province) currentProvince = province;
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  if(view==='home'){
    document.getElementById('view-home').classList.add('active');
    location.hash = '#home';
    renderPmScroll();
    renderProvinceGrid();
  } else if(view==='province'){
    document.getElementById('view-province').classList.add('active');
    location.hash = '#province/' + encodeURIComponent(province);
    renderProvinceView(province);
  } else if(view==='pm25'){
    document.getElementById('view-pm25').classList.add('active');
    const cameFromProvince = document.getElementById('view-province').dataset.last === province;
    location.hash = '#pm25/' + encodeURIComponent(province);
    renderPm25View(province, true);
  }
  window.scrollTo({top:0, behavior:'smooth'});
}

function routeFromHash(){
  const hash = location.hash.replace('#','');
  const [view, param] = hash.split('/');
  const name = param ? decodeURIComponent(param) : null;
  if(view==='province' && name) navigate('province', name);
  else if(view==='pm25' && name) navigate('pm25', name);
  else navigate('home');
}

window.addEventListener('hashchange', routeFromHash);
paintSkyStrip();
setInterval(paintSkyStrip, 5*60*1000);
routeFromHash();
</script>
